<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Commandes · Vinted Stats Tracker</title>
    <link rel="stylesheet" href="assets/css/style.css?v=20260622-stock-matching">
  </head>
  <body>
    <header class="app-header">
      <div class="header-inner">
        <a class="brand" href="index.html">Vinted Stats</a>
        <nav class="nav" data-nav>
          <a href="index.html" class="active">Commandes</a>
          <a href="statistiques.html">Statistiques</a>
          <a href="articles.html">Articles</a>
          <a href="vinted-stocks/index.html">Stocks</a>
        </nav>
      </div>
    </header>

    <main class="page">
      <h1>Commandes en cours</h1>

      <form class="settings-panel" data-settings-form>
        <input name="apiUrl" type="url" placeholder="URL API serveur">
        <input name="adminToken" type="password" placeholder="Clé admin">
        <button type="submit">Enregistrer</button>
      </form>

      <section class="summary-strip" data-orders-summary></section>

      <section class="toolbar">
        <input data-search type="search" placeholder="Rechercher">
        <select data-status-filter>
          <option value="">Tous les statuts</option>
          <option value="todo">Pas encore préparé</option>
          <option value="prepared">Préparé</option>
          <option value="sent">Envoyé</option>
          <option value="finished">Terminé</option>
          <option value="archived">Archivé</option>
        </select>
        <select data-account-filter>
          <option value="">Tous les comptes</option>
        </select>
        <label class="checkbox-line">
          <input data-show-finished type="checkbox">
          Terminées
        </label>
        <button class="secondary" data-refresh type="button">Rafraîchir</button>
        <button class="secondary" data-bulk-prepared type="button">Tout préparer</button>
        <button class="secondary" data-bulk-sent type="button">Tout envoyer</button>
        <button class="secondary" data-manual-sale-open type="button">Vente manuelle</button>
        <button data-poll type="button">Vérifier Gmail</button>
        <button class="secondary" data-rescan type="button">Rescanner mails</button>
      </section>

      <section class="orders-list" data-orders-list></section>
    </main>

    <div class="modal-backdrop" data-merge-modal hidden>
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="merge-title">
        <div class="modal-header">
          <h2 id="merge-title">Fusionner la vente</h2>
          <button class="secondary" type="button" data-close-modal>Fermer</button>
        </div>
        <form data-merge-form>
          <input data-group-search type="search" placeholder="Rechercher un groupe">
          <select data-group-select></select>
          <input data-new-group-name type="text" placeholder="Nouveau groupe">
          <div class="modal-actions">
            <button class="secondary" type="button" data-close-modal>Annuler</button>
            <button type="submit">Fusionner</button>
          </div>
        </form>
      </div>
    </div>

    <div class="modal-backdrop" data-stock-modal hidden>
      <div class="modal stock-modal" role="dialog" aria-modal="true" aria-labelledby="stock-title">
        <div class="modal-header">
          <div>
            <h2 id="stock-title">Association stock</h2>
            <p class="muted" data-stock-title></p>
          </div>
          <button class="secondary" type="button" data-close-stock-modal>Fermer</button>
        </div>
        <form data-stock-form>
          <input data-stock-search type="search" placeholder="Rechercher dans le stock">
          <div class="stock-selected-list" data-stock-selected-list></div>
          <div class="stock-fields stock-product-grid" data-stock-fields></div>
          <label>
            Prix d'achat pour cette vente (€)
            <input data-stock-purchase name="purchasePrice" type="number" min="0" step="0.01" placeholder="Laisser vide = prix du stock">
          </label>
          <label class="checkbox-line stock-ignore-line">
            <input data-stock-ignore name="ignoreStock" type="checkbox">
            Ignorer le stock pour cette vente / prix manuel uniquement
          </label>
          <div class="modal-actions">
            <button class="secondary" type="button" data-close-stock-modal>Annuler</button>
            <button type="submit">Enregistrer</button>
          </div>
        </form>
      </div>
    </div>


    <div class="modal-backdrop" data-manual-sale-modal hidden>
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="manual-sale-title">
        <div class="modal-header">
          <h2 id="manual-sale-title">Ajouter une vente manuelle</h2>
          <button class="secondary" type="button" data-close-manual-sale-modal>Fermer</button>
        </div>
        <form data-manual-sale-form>
          <input name="rawTitle" type="text" placeholder="Titre Vinted" required>
          <input name="price" type="number" min="0" step="0.01" placeholder="Prix de vente (€)" required>
          <input name="buyerUsername" type="text" placeholder="Acheteur">
          <input name="accountName" type="text" placeholder="Compte Vinted">
          <input name="soldAt" type="datetime-local">
          <select name="status">
            <option value="todo">Pas encore préparé</option>
            <option value="prepared">Préparé</option>
            <option value="sent">Envoyé</option>
            <option value="finished">Terminé</option>
          </select>
          <input name="imagePath" type="url" placeholder="URL image (optionnel)">
          <div class="modal-actions">
            <button class="secondary" type="button" data-close-manual-sale-modal>Annuler</button>
            <button type="submit">Ajouter</button>
          </div>
        </form>
      </div>
    </div>

    <div class="toast" data-toast></div>
    <script src="assets/js/fallback.js"></script>
    <script type="module" src="assets/js/orders.js"></script>

    <script type="module" src="assets/js/orders.js?v=20260622-stock-matching"></script>

    <script type="module" src="assets/js/orders.js?v=20260622-stocks-nav"></script>
  </body>
</html>

<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">

      <div class="header-inner">
        <a class="brand" href="index.html">Vinted Stats</a>
        <nav class="nav" data-nav>

      <section class="stock-review-panel" data-stock-review hidden></section>

      <section class="groups-list" data-groups-list></section>

      <div class="section-heading">
        <h2>Ventes non groupées</h2>
      </div>
      <section class="ungrouped-list" data-ungrouped-list></section>

    <div class="toast" data-toast></div>
    <script src="assets/js/fallback.js"></script>

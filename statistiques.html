<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Statistiques · Vinted Stats Tracker</title>
    <link rel="stylesheet" href="assets/css/style.css">
  </head>
  <body>
    <header class="app-header">
      <div class="header-inner">
        <a class="brand" href="index.html">Vinted Stats</a>
        <nav class="nav" data-nav></nav>
      </div>
    </header>

    <main class="page">
      <h1>Statistiques</h1>

      <form class="settings-panel" data-settings-form>
        <input name="apiUrl" type="url" placeholder="URL API serveur">
        <input name="adminToken" type="password" placeholder="Clé admin">
        <button type="submit">Enregistrer</button>
      </form>

      <section class="summary-strip" data-stats-summary></section>

      <section class="chart-panel">
        <div class="chart-header">
          <div>
            <h2 data-chart-title>Heures de vente</h2>
            <p class="muted" data-chart-subtitle>Répartition des ventes par jour et heure, basée sur la date du mail.</p>
          </div>
          <div class="segmented-control" data-chart-tabs>
            <button type="button" class="active" data-chart-mode="time">Ventes</button>
            <button type="button" data-chart-mode="articles">Articles</button>
          </div>
        </div>
        <div data-chart></div>
      </section>

      <section class="toolbar">
        <select data-sort>
          <option value="count">Nombre de ventes</option>
          <option value="average">Prix moyen</option>
          <option value="total">Total encaissé</option>
          <option value="lastSale">Dernière vente</option>
        </select>
      </section>

      <section class="stats-list" data-stats-list></section>
    </main>

    <div class="toast" data-toast></div>
    <script type="module" src="assets/js/stats.js"></script>
  </body>
</html>
